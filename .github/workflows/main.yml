name: Build and Deploy spring app

on:
  push:
    branches:
      - main
        
jobs: 
  build-deploy:
    name: Build and Deploy spring app for beginners
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Unit Tests
        run: mvn -B test 

      - name: Build the application
        run: mvn -B package 