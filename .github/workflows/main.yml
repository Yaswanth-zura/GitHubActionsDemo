name: Build and Deploy spring app

on:
  push:
    branches:
      - main
        
jobs: 
  build-deploy:
    name: Build and Deploy spring app for beginners
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Unit Tests
        working-directory: Spring-App   # <-- EXACT folder name
        run: mvn -B test

      - name: Build
        working-directory: Spring-App
        run: mvn clean package